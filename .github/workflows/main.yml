name: MyOffice CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # --- BACKEND TESTING ---
  backend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # <--- ADD THIS LINE
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # This will now look for your tests inside the backend folder too
      - name: Run Pytest
        run: pytest

  # --- FRONTEND TESTING ---
  frontend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # <--- ADD THIS LINE
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # This tells GitHub where to find your package-lock.json for caching
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Vitest
        working-directory: ./frontend
        run: npm test
